name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            client/requirements.txt

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt

      - name: Install client dependencies
        run: python -m pip install -r client/requirements.txt

      - name: Install test runner
        run: python -m pip install pytest

      - name: Compile Python modules
        run: python -m compileall -q -x ".*\.venv.*|.*__pycache__.*" backend client shared tests

      - name: Run Python tests
        run: python -m pytest tests

  web:
    name: Web checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Run lint if configured
        run: npm run lint --if-present

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  go:
    name: Go checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Check formatting
        run: test -z "$(gofmt -l main.go)"

      - name: Run Go tests
        run: go test ./...

      - name: Build Go backend
        run: go build ./...
